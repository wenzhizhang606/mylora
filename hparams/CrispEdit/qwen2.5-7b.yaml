# We provide two implementations (objective_optimization):
#   1. prompt_last: the method of ROME's (https://arxiv.org/abs/2202.05262) original paper, which calculates nll loss through the last token of the input.
#   2. target_new: the standard autoregressive method, using the cross-entropy loss function

alg_name: "CRISPEDIT"
model_name: "Qwen2.5-7B-Instruct"
device: 1

layers: [15, 16, 17, 18, 19]
num_steps: 25
batch_size: 32
max_length: 40
lr: 5e-4
weight_decay: 0
kl_factor: 0
norm_constraint: false
# "prompt_last" corresponds to the results of FT-L.
# "target_new" corresponds to the results of FT-M.
objective_optimization: "target_new"
rewrite_module_tmp: "model.layers.{}.mlp.down_proj.weight"
layer_module_tmp: "model.layers.{}"
mlp_module_tmp: "model.layers.{}.mlp"
attn_module_tmp: "model.layers.{}.self_attn"
ln_f_module: "model.norm"
lm_head_module: "lm_head"
model_parallel: false
mom2_dataset: "wikipedia"
mom2_n_samples: 1000
mom2_dtype: "float32"
energy_threshold: 0.99

base_kfac_cache_path: "/home/zwz/01_crispedit/Qwen2.5-7B-Instruct/wikipedia_stats"
task_kfac_cache_path: "/home/zwz/01_crispedit/Qwen2.5-7B-Instruct/zsre_mend_163k_stats"
projection_cache_path: null
task_projection_cache_path: null
newton_damping:  1e-3
use_second_projection: True